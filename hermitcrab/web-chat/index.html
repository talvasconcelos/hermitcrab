<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>HermitCrab Chat</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦀</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        crab: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            200: '#99f6e4',
                            300: '#5eead4',
                            400: '#2dd4bf',
                            500: '#14b8a6',
                            600: '#0d9488',
                            700: '#0f766e',
                            800: '#115e59',
                            900: '#134e4a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .message-bubble { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-track { background: transparent; }
        #chat-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">
    <!-- Login Screen -->
    <div id="login-screen" class="flex-1 flex items-center justify-center p-4">
        <div class="max-w-md w-full text-center">
            <div class="text-6xl mb-4">🦀</div>
            <h1 class="text-3xl font-semibold mb-2 text-crab-400">HermitCrab</h1>
            <p class="text-slate-400 mb-8">Your personal AI assistant on Nostr</p>
            
            <div class="bg-slate-900/50 border border-slate-800 rounded-2xl p-6 mb-6">
                <p class="text-sm text-slate-400 mb-4">
                    Connect with your Nostr extension to start chatting
                </p>
                <button id="login-btn" class="w-full bg-crab-600 hover:bg-crab-500 text-white font-medium py-3 px-6 rounded-xl transition-all duration-200 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                    </svg>
                    Connect with Nostr
                </button>
            </div>
            
            <p class="text-xs text-slate-500">
                Requires a Nostr extension (Alby, nos2x, or similar)<br>
                Messages are encrypted with NIP-04
            </p>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chat-screen" class="hidden flex-1 flex flex-col max-w-3xl mx-auto w-full">
        <!-- Header -->
        <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-sm px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="text-2xl">🦀</div>
                <div>
                    <h2 class="font-medium text-slate-100">HermitCrab</h2>
                    <span class="text-xs text-crab-400">● Online</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span id="user-npub" class="text-xs text-slate-500 font-mono max-w-[120px] truncate"></span>
                <button id="logout-btn" class="p-2 hover:bg-slate-800 rounded-lg transition-colors" title="Disconnect">
                    <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Messages -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4">
            <div class="flex justify-center">
                <span class="text-xs text-slate-600 bg-slate-900/50 px-3 py-1 rounded-full">Today</span>
            </div>
        </div>

        <!-- Input -->
        <div class="border-t border-slate-800 bg-slate-900/50 backdrop-blur-sm p-4">
            <div class="flex gap-2">
                <input 
                    id="message-input" 
                    type="text" 
                    placeholder="Message HermitCrab..." 
                    class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-crab-500 focus:ring-1 focus:ring-crab-500 transition-all"
                    autocomplete="off"
                >
                <button 
                    id="send-btn" 
                    class="bg-crab-600 hover:bg-crab-500 disabled:opacity-50 disabled:cursor-not-allowed text-white px-4 py-3 rounded-xl transition-all duration-200 flex items-center gap-2"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                    </svg>
                </button>
            </div>
            <div class="flex items-center justify-between mt-2 text-xs text-slate-500">
                <span>Messages sent via Nostr NIP-04</span>
                <span id="relay-status" class="flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-yellow-500 rounded-full"></span>
                    Connecting...
                </span>
            </div>
        </div>
    </div>

    <!-- Error Toast -->
    <div id="error-toast" class="fixed top-4 right-4 bg-red-900/90 border border-red-700 text-red-100 px-4 py-3 rounded-xl shadow-lg transform translate-x-full transition-transform duration-300 max-w-sm z-50">
        <div class="flex items-start gap-2">
            <svg class="w-5 h-5 mt-0.5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span id="error-message">Error message</span>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(console.error);
        }
    </script>
</body>
</html>
